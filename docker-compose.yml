services:
  backend:
    build:
      context: ./fiora_backend
      dockerfile: Dockerfile   
    container_name: django_app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/fiora_backend/.env
    depends_on:
      - redis

  frontend:
    build:
      context: ./fiora
      dockerfile: Dockerfile
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ./fiora:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"