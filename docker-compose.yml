services:
  backend:
    build:
      context: ./fiora_backend
      dockerfile: Dockerfile   
    container_name: django_app
    ports:
      - "8000:8000"
    env_file:
      - .env   
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../fiora
      dockerfile: Dockerfile
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ../fiora:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: fiora_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_server
    ports:
      - "6379:6379"

volumes:
  postgres_data:
